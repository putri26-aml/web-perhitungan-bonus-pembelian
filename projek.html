<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perhitungan Bonus Pembelian</title>
  <link rel="stylesheet" href="projek.css">
</head>
<body>
  <div class="container">
    <h2>Website Sederhana Perhitungan Bonus Pembelian</h2>
    <form id="bonusForm">
      <label>Nama Pelanggan</label>
      <input type="text" id="nama" required>

      <label>Nama Produk</label>
      <input type="text" id="produk" required>

      <label>Harga Produk</label>
      <input type="number" id="harga" required>

      <label>Jumlah Pembelian</label>
      <input type="number" id="jumlah" required>

      <div class="buttons">
        <button type="button" onclick="hitung()">Hitung</button>
        <button type="reset">Reset</button>
      </div>
    </form>

    <div id="hasil" class="card"></div>
  </div>

  <script src="projek.js"></script>
</body>
</html>
